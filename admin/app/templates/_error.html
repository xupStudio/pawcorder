{% extends "base.html" %}
{% block title %}{{ heading }} · Pawcorder{% endblock %}
{% block body %}
<div class="relative min-h-full flex items-center justify-center px-4 py-12 overflow-hidden">

  <span class="paw-svg paw-float text-brand-300 dark:text-brand-400/40 absolute" aria-hidden
        style="top:14%; left:10%; width:42px; height:42px; --r:-18deg;"></span>
  <span class="paw-svg paw-float text-brand-200 dark:text-brand-400/30 absolute" aria-hidden
        style="top:22%; right:12%; width:32px; height:32px; --r:24deg; animation-delay:-1.5s;"></span>
  <span class="paw-svg paw-float text-brand-300 dark:text-brand-400/40 absolute" aria-hidden
        style="bottom:14%; left:14%; width:28px; height:28px; --r:8deg; animation-delay:-2.4s;"></span>

  <div class="relative w-full max-w-md text-center">
    <img src="/static/icon.svg" alt="" class="h-20 w-20 mx-auto opacity-90" />
    <p class="mt-6 text-xs font-medium uppercase tracking-eyebrow text-brand-600 dark:text-brand-400">{{ status_code }}</p>
    <h1 class="mt-2 text-3xl font-display tracking-display text-slate-900 dark:text-slate-100">{{ heading }}</h1>
    <p class="mt-3 text-sm text-slate-600 dark:text-slate-300">{{ body }}</p>
    <a href="/" class="mt-8 inline-flex items-center gap-2 rounded-md bg-brand-500 hover:bg-brand-600 text-white px-4 py-2 text-sm font-medium">
      ← {{ home_label }}
    </a>
  </div>
</div>
{% endblock %}
