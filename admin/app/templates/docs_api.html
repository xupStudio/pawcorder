{% extends "_layout.html" %}
{% block title %}{{ t('DOCS_API_TITLE') }} · Pawcorder{% endblock %}
{% block main %}
<div x-data="docsApi()" x-init="load()" class="max-w-3xl">
  <div class="flex items-center justify-between mb-6 gap-2">
    <div>
      <h1 class="text-3xl font-display tracking-display">{{ t('DOCS_API_TITLE') }}</h1>
      <p class="text-sm text-slate-500 dark:text-slate-400 italic">{{ t('DOCS_API_SUBTITLE') }}</p>
    </div>
    <a href="/system" class="text-sm text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-slate-100 dark:hover:text-slate-200">
      {{ t('DOCS_API_API_KEYS_LINK') }} →
    </a>
  </div>

  <div class="rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 p-6 prose prose-slate dark:prose-invert max-w-none">
    <div x-show="loading">{{ t('SAVING') }}</div>
    <div x-show="error" class="rounded bg-rose-50 dark:bg-rose-900 border border-rose-200 dark:border-rose-800 p-3 text-rose-800 dark:text-rose-200" x-text="error"></div>
    <!-- We render markdown client-side via marked. CDN — falls back to
         a styled <pre> if the script doesn't load. -->
    <article x-html="rendered" x-show="rendered"></article>
    <pre x-show="!rendered && !loading" class="text-xs whitespace-pre-wrap" x-text="raw"></pre>
  </div>
</div>

<!-- marked.js for client-side markdown rendering. ~30 KB, MIT. -->
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"
        integrity="sha384-cKoxL3SCLQU9MX5jwOuO0ml+wSiPpzWBM5kkkLQjAJBcEnEs4dbBzPLh7Y2VGjJK"
        crossorigin="anonymous"></script>
<script>
  function docsApi() {
    return {
      raw: '',
      rendered: '',
      loading: true,
      error: '',
      async load() {
        try {
          const resp = await fetch('/api/system/integrations', {
            credentials: 'same-origin',
            headers: { 'X-Requested-With': 'pawcorder' },
          });
          if (!resp.ok) {
            this.error = {{ t('DOCS_API_LOAD_ERROR') | tojson }} + ' (' + resp.status + ')';
            return;
          }
          this.raw = await resp.text();
          // marked may not be loaded yet (defer); poll briefly.
          for (let i = 0; i < 20 && typeof window.marked === 'undefined'; i++) {
            await new Promise(r => setTimeout(r, 50));
          }
          if (typeof window.marked !== 'undefined') {
            this.rendered = window.marked.parse(this.raw);
          }
        } catch (e) { this.error = e.message; }
        finally { this.loading = false; }
      },
    };
  }
</script>
{% endblock %}
