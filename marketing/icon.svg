<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="pc-mark-title">
  <title id="pc-mark-title">Pawcorder</title>
  <!--
    Pawcorder mark.
    A paw print whose main pad doubles as a camera lens —
    Paw (pet) + corder (recording) fused into one silhouette.
    Optimised for small-size legibility (24-36 px favicon / nav):
    a single bold concentric lens beats fine detail that mushes.
  -->
  <defs>
    <linearGradient id="pc-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#f59239"/>
      <stop offset="100%" stop-color="#bd420c"/>
    </linearGradient>
  </defs>

  <g fill="url(#pc-grad)">
    <!-- four toe beans, arranged in a gentle arc -->
    <ellipse cx="146" cy="208" rx="44" ry="64" transform="rotate(-18 146 208)"/>
    <ellipse cx="218" cy="138" rx="44" ry="64" transform="rotate(-6 218 138)"/>
    <ellipse cx="294" cy="138" rx="44" ry="64" transform="rotate(6 294 138)"/>
    <ellipse cx="366" cy="208" rx="44" ry="64" transform="rotate(18 366 208)"/>
    <!-- main pad — large rounded trefoil silhouette, sized to host a bold lens -->
    <path d="M256 268
             C 138 268, 72 332, 76 410
             C 80 470, 148 492, 216 480
             C 244 476, 252 468, 256 468
             C 260 468, 268 476, 296 480
             C 364 492, 432 470, 436 410
             C 440 332, 374 268, 256 268 Z"/>
  </g>

  <!-- Camera lens — bold concentric pair, paper-cream + deep-orange pupil.
       Survives downscaling because each ring is wide enough to render at any DPR. -->
  <circle cx="256" cy="380" r="62" fill="#FBF8F3"/>
  <circle cx="256" cy="380" r="22" fill="#7a2e12"/>
</svg>
